<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Edit — Parliament of the Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111; --surface: #1c1c1c; --border: #2e2e2e;
      --text: #d4d4d4; --muted: #555; --accent: #c8a96e;
      --raw-bg: #151515; --flag: #8b4040;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh; padding: 2.5rem 1.2rem 5rem;
      max-width: 680px; margin: 0 auto; line-height: 1.75;
    }
    header { margin-bottom: 2rem; }
    .project { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .session-date { font-size: 1.3rem; color: var(--accent); font-style: italic; }
    .progress { display: flex; gap: 6px; margin: 1.8rem 0 2rem; }
    .dot { height: 4px; flex: 1; background: var(--border); border-radius: 2px; cursor: pointer; transition: background 0.2s; }
    .dot.done    { background: var(--accent); }
    .dot.current { background: var(--text); }
    .dot.flagged { background: var(--flag); }
    .label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.6rem; }
    .raw {
      background: var(--raw-bg); border-left: 3px solid var(--border);
      padding: 1rem 1.2rem; color: #888; font-size: 0.95rem;
      margin-bottom: 2rem; white-space: pre-wrap;
    }
    .raw.is-flagged { border-left-color: var(--flag); }
    textarea {
      width: 100%; min-height: 240px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: Georgia, serif; font-size: 1rem;
      line-height: 1.75; padding: 1rem; resize: vertical; outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    .flagged-msg {
      padding: 1rem 1.2rem; border: 1px dashed var(--flag);
      border-radius: 4px; color: var(--flag); font-size: 0.9rem;
      font-style: italic; margin-bottom: 0;
    }
    .nav { display: flex; gap: 0.8rem; margin-top: 1.5rem; align-items: center; flex-wrap: wrap; }
    .spacer { flex: 1; }
    button {
      padding: 0.55rem 1.3rem; border: 1px solid var(--border);
      border-radius: 4px; background: transparent; color: var(--text);
      font-family: Georgia, serif; font-size: 0.9rem; cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.25; cursor: default; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #111; }
    button.primary:hover { background: #d4b87e; border-color: #d4b87e; color: #111; }
    button.flag-btn { border-color: var(--flag); color: var(--flag); font-size: 0.82rem; padding: 0.45rem 0.9rem; }
    button.flag-btn.active { background: var(--flag); color: #fff; }
    button.flag-btn:hover { background: var(--flag); color: #fff; border-color: var(--flag); }
    .setup { max-width: 460px; margin: 4rem auto; }
    .setup h2 { color: var(--accent); font-style: italic; margin-bottom: 1rem; font-size: 1.4rem; }
    .setup p { color: var(--muted); font-size: 0.88rem; line-height: 1.65; margin-bottom: 1.4rem; }
    .setup input {
      width: 100%; padding: 0.65rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: monospace; font-size: 0.9rem; outline: none; margin-bottom: 1rem;
    }
    .setup input:focus { border-color: var(--accent); }
    .center { text-align: center; padding: 4rem 0; }
    .center h2 { font-style: italic; font-size: 1.6rem; margin-bottom: 0.8rem; }
    .center p { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .err { color: #d07070; }
    .token-btn {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      font-size: 0.72rem; color: var(--muted); cursor: pointer;
      background: none; border: none; font-family: Georgia, serif; padding: 0;
    }
    .token-btn:hover { color: var(--text); }
  </style>
</head>
<body>
<div id="app"></div>
<button class="token-btn" onclick="showSetup()">⚙ token</button>
<script>
const OWNER  = 'heinoriese';
const REPO   = 'Wheres-The-Cue-Ball-Going-';
const BRANCH = 'main';
const N = 5;

let snippets = [], picked = [], edits = [], flags = [], current = 0;
let seenIndices = new Set();
let sessionRound = 0;

// ── Seeded random ──────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function pickBatch(all, avoid) {
  sessionRound++;
  const seed = parseInt(todayStr().replace(/-/g,''), 10) + sessionRound * 999983;
  const rand = mulberry32(seed);
  const pool = Array.from({length: all.length}, (_, i) => i).filter(i => !avoid.has(i));
  if (!pool.length) return [];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, Math.min(N, pool.length))
    .sort((a, b) => a - b)
    .map(i => ({i, text: all[i]}));
}

// ── Helpers ────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0, 10); }

function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function fromB64(b64) {
  return new TextDecoder().decode(
    Uint8Array.from(atob(b64.replace(/\n/g, '')), c => c.charCodeAt(0))
  );
}

function getPAT() { return localStorage.getItem('gh_pat') || ''; }
function setPAT(p) { localStorage.setItem('gh_pat', p.trim()); }

// ── GitHub API ─────────────────────────────────────────────────
async function fetchFile(path) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const r = await fetch(url, { headers: { Authorization: `token ${getPAT()}` } });
  if (r.status === 404) return { text: null, sha: null };
  if (!r.ok) throw new Error(`Could not fetch ${path}: ${r.status}`);
  const d = await r.json();
  return { text: fromB64(d.content), sha: d.sha };
}

async function putFile(path, content, sha, message) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const body = { message, content: toB64(content), branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `token ${getPAT()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error((await r.json()).message || `Failed to write ${path}`);
}

async function fetchInbox() {
  const r = await fetch(
    `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/inbox.md?t=${Date.now()}`
  );
  if (!r.ok) throw new Error('Could not load inbox.md');
  return r.text();
}

function parseSnippets(text) {
  return text.split('\n---\n').map(s => s.trim()).filter(s => s && !s.startsWith('#'));
}

// ── Commit ─────────────────────────────────────────────────────
async function commitAll() {
  const date = todayStr();

  // 1. Update manuscript-edited.md
  let { text: msText, sha: msSha } = await fetchFile('manuscript-edited.md');
  let ms = msText ? parseSnippets(msText) : snippets.slice();

  // Apply non-flagged edits where text actually changed
  picked.forEach((p, i) => {
    if (!flags[i] && p.i < ms.length) ms[p.i] = edits[i];
  });

  const msOut = '# Parliament of the Snake — Edited Manuscript\n\n---\n\n' +
    ms.join('\n\n---\n\n') + '\n\n---\n';
  await putFile('manuscript-edited.md', msOut, msSha, `Edit — ${date}`);

  // 2. Append flagged passages to rebuild.md
  const flagged = picked.filter((_, i) => flags[i]);
  if (flagged.length) {
    let { text: rbText, sha: rbSha } = await fetchFile('rebuild.md');
    const base = rbText || '# Rebuild List\n\nPassages flagged for structural work.\n';
    const additions = '\n---\n\n' + flagged.map(p =>
      `**Snippet ${p.i + 1}**\n\n${p.text}`
    ).join('\n\n---\n\n');
    await putFile('rebuild.md', base + additions, rbSha, `Flag for rebuild — ${date}`);
  }

  return { edited: picked.filter((p, i) => !flags[i] && edits[i] !== p.text).length, flagged: flagged.length };
}

// ── Render ─────────────────────────────────────────────────────
const app = document.getElementById('app');
function render(html) { app.innerHTML = html; }

function saveEdit() {
  const a = document.getElementById('edit-area');
  if (a) edits[current] = a.value;
}

function toggleFlag(i) {
  saveEdit();
  flags[i] = !flags[i];
  showSnippet();
}

function showSnippet() {
  const p      = picked[current];
  const isLast = current === picked.length - 1;
  const isFlagged = flags[current];

  const dots = picked.map((_, i) => {
    const cls = flags[i] ? 'flagged' : i < current ? 'done' : i === current ? 'current' : '';
    return `<div class="dot ${cls}" onclick="goTo(${i})"></div>`;
  }).join('');

  const editArea = isFlagged
    ? `<div class="flagged-msg">Flagged for structural rebuild — won't be edited here.</div>`
    : `<textarea id="edit-area">${esc(edits[current])}</textarea>`;

  render(`
    <header>
      <div class="project">Parliament of the Snake</div>
      <div class="session-date">${fmtDate(todayStr())}</div>
    </header>

    <div class="progress">${dots}</div>

    <div class="label">Raw — ${current + 1} of ${picked.length}</div>
    <div class="raw ${isFlagged ? 'is-flagged' : ''}">${esc(p.text)}</div>

    <div class="label">${isFlagged ? 'Flagged' : 'Your edit'}</div>
    ${editArea}

    <div class="nav">
      <button onclick="goTo(${current - 1})" ${current === 0 ? 'disabled' : ''}>← Back</button>
      <button class="flag-btn ${isFlagged ? 'active' : ''}" onclick="toggleFlag(${current})">
        ${isFlagged ? '🚩 Flagged' : '🚩 Flag'}
      </button>
      <div class="spacer"></div>
      ${isLast
        ? `<button class="primary" onclick="doCommit()">Commit ↗</button>`
        : `<button class="primary" onclick="goTo(${current + 1})">Next →</button>`}
    </div>
  `);

  if (!isFlagged) {
    document.getElementById('edit-area').addEventListener('input', e => { edits[current] = e.target.value; });
  }
}

function goTo(i) {
  saveEdit();
  current = Math.max(0, Math.min(picked.length - 1, i));
  showSnippet();
  window.scrollTo(0, 0);
}

function loadBatch() {
  picked  = pickBatch(snippets, seenIndices);
  if (!picked.length) {
    render(`<div class="center"><h2 style="color:var(--accent)">All done.</h2><p>You've been through everything.</p></div>`);
    return false;
  }
  picked.forEach(p => seenIndices.add(p.i));
  edits   = picked.map(p => p.text);
  flags   = picked.map(() => false);
  current = 0;
  return true;
}

async function doCommit() {
  saveEdit();
  render('<div class="center"><h2 style="color:var(--muted);font-size:1rem">Saving…</h2></div>');
  try {
    const { edited, flagged } = await commitAll();
    const remaining = snippets.length - seenIndices.size;
    render(`
      <div class="center">
        <h2 style="color:var(--accent)">Saved.</h2>
        <p>${edited} edit${edited !== 1 ? 's' : ''} → manuscript-edited.md</p>
        ${flagged ? `<p>${flagged} flagged → rebuild.md</p>` : ''}
        <p style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">${remaining} passages left unseen</p>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:2rem">
          <button onclick="keepGoing()">Keep going →</button>
          <button style="color:var(--muted)">Done for now</button>
        </div>
      </div>
    `);
  } catch (e) {
    const isAuth = /401|credential|token/i.test(e.message);
    render(`
      <div class="center">
        <h2 class="err">Save failed</h2>
        <p>${esc(e.message)}</p>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem">
          <button onclick="doCommit()">Try again</button>
          ${isAuth ? `<button onclick="showSetup('Token rejected')">Update token</button>` : ''}
        </div>
      </div>
    `);
  }
}

function keepGoing() {
  if (loadBatch()) showSnippet();
}

// ── Setup ──────────────────────────────────────────────────────
function showSetup(err) {
  render(`
    <div class="setup">
      <h2>One-time setup</h2>
      <p>
        Needs a GitHub <strong>classic</strong> token with <strong>repo</strong> scope.<br><br>
        GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate.
      </p>
      <input type="password" id="pat" placeholder="ghp_…" value="${esc(getPAT())}">
      ${err ? `<p class="err" style="margin-bottom:1rem">${esc(err)}</p>` : ''}
      <button class="primary" onclick="savePAT()">Save &amp; start</button>
    </div>
  `);
  document.getElementById('pat').focus();
}

function savePAT() {
  const v = document.getElementById('pat').value.trim();
  if (!v) return;
  setPAT(v);
  init();
}

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  if (!getPAT()) { showSetup(); return; }
  render('<div class="center"><h2 style="color:var(--muted);font-size:1rem">Loading…</h2></div>');
  try {
    const raw = await fetchInbox();
    snippets  = parseSnippets(raw);
    if (!snippets.length) throw new Error('inbox.md is empty');
    seenIndices  = new Set();
    sessionRound = 0;
    if (loadBatch()) showSnippet();
  } catch (e) {
    render(`
      <div class="center">
        <h2 class="err">Couldn't load</h2>
        <p>${esc(e.message)}</p>
        <button onclick="init()" style="margin-top:1.5rem">Retry</button>
      </div>
    `);
  }
}

init();
</script>
</body>
</html>
