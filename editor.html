<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Edit — Parliament of the Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111; --surface: #1c1c1c; --border: #2e2e2e;
      --text: #d4d4d4; --muted: #555; --accent: #c8a96e;
      --raw-bg: #151515; --flag: #8b4040;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh; padding: 2.5rem 1.2rem 5rem;
      max-width: 680px; margin: 0 auto; line-height: 1.75;
    }
    header { margin-bottom: 2rem; }
    .project { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .session-date { font-size: 1.3rem; color: var(--accent); font-style: italic; }
    .progress { display: flex; gap: 6px; margin: 1.8rem 0 2rem; }
    .dot { height: 4px; flex: 1; background: var(--border); border-radius: 2px; cursor: pointer; transition: background 0.2s; }
    .dot.done    { background: var(--accent); }
    .dot.current { background: var(--text); }
    .dot.flagged { background: var(--flag); }
    .label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.6rem; }
    .raw {
      background: var(--raw-bg); border-left: 3px solid var(--border);
      padding: 1rem 1.2rem; color: #888; font-size: 0.95rem;
      margin-bottom: 2rem; white-space: pre-wrap;
    }
    .raw.is-flagged { border-left-color: var(--flag); }
    textarea {
      width: 100%; min-height: 240px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: Georgia, serif; font-size: 1rem;
      line-height: 1.75; padding: 1rem; resize: vertical; outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    .flagged-msg {
      padding: 1rem 1.2rem; border: 1px dashed var(--flag);
      border-radius: 4px; color: var(--flag); font-size: 0.9rem;
      font-style: italic;
    }
    .wc-delta { text-align: right; font-size: 0.75rem; margin-top: 0.4rem; min-height: 1.1em; color: var(--muted); }
    .nav { display: flex; gap: 0.8rem; margin-top: 1.5rem; align-items: center; flex-wrap: wrap; }
    .spacer { flex: 1; }
    button {
      padding: 0.55rem 1.3rem; border: 1px solid var(--border);
      border-radius: 4px; background: transparent; color: var(--text);
      font-family: Georgia, serif; font-size: 0.9rem; cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.25; cursor: default; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #111; }
    button.primary:hover { background: #d4b87e; border-color: #d4b87e; color: #111; }
    button.flag-btn { border-color: var(--flag); color: var(--flag); font-size: 0.82rem; padding: 0.45rem 0.9rem; }
    button.flag-btn.active { background: var(--flag); color: #fff; }
    button.flag-btn:hover { background: var(--flag); color: #fff; border-color: var(--flag); }
    button.retire-btn { border-color: var(--muted); color: var(--muted); font-size: 0.82rem; padding: 0.45rem 0.9rem; }
    button.retire-btn:hover { border-color: #6a9a6a; color: #6a9a6a; background: transparent; }
    .setup { max-width: 460px; margin: 4rem auto; }
    .setup h2 { color: var(--accent); font-style: italic; margin-bottom: 1rem; font-size: 1.4rem; }
    .setup p { color: var(--muted); font-size: 0.88rem; line-height: 1.65; margin-bottom: 1.4rem; }
    .setup input {
      width: 100%; padding: 0.65rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: monospace; font-size: 0.9rem; outline: none; margin-bottom: 1rem;
    }
    .setup input:focus { border-color: var(--accent); }
    .capture-ta {
      width: 100%; min-height: 280px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: Georgia, serif; font-size: 1rem; line-height: 1.75;
      padding: 1rem; resize: vertical; outline: none; margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .capture-ta:focus { border-color: var(--accent); }
    .center { text-align: center; padding: 4rem 0; }
    .center h2 { font-style: italic; font-size: 1.6rem; margin-bottom: 0.8rem; }
    .center p { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .err { color: #d07070; }
    .pass-badge { float: right; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; font-style: normal; }
    .aux-btns {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      display: flex; gap: 1.2rem; align-items: center;
    }
    .aux-btn {
      font-size: 0.72rem; color: var(--muted); cursor: pointer;
      background: none; border: none; font-family: Georgia, serif;
      padding: 0; border-radius: 0;
    }
    .aux-btn:hover { color: var(--text); border: none; }
  </style>
</head>
<body>
<div id="app"></div>
<div class="aux-btns">
  <button class="aux-btn" onclick="showFind()">find</button>
  <button class="aux-btn" onclick="showStats()">stats</button>
  <button class="aux-btn" onclick="showCapture()">+ add</button>
  <button class="aux-btn" onclick="showSetup()">⚙ token</button>
</div>
<script>
const OWNER     = 'heinoriese';
const REPO      = 'Wheres-The-Cue-Ball-Going-';
const BRANCH    = 'main';
const N         = 5;
const DRAFT_KEY = 'pots_draft';

let snippets = [], picked = [], edits = [], flags = [], current = 0;
let seenIndices = new Set();
let sessionRound = 0;
let progress = {}, progressSha = null;
let draftRestored = false;
let msEdits = {};            // snippet index -> your accumulated edited text
let flagSet = new Set();     // snippet indices already flagged for rebuild

// ── Seeded random ──────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Draft (auto-save to localStorage) ─────────────────────────
function saveDraft() {
  if (!picked.length) return;
  localStorage.setItem(DRAFT_KEY, JSON.stringify({
    picked, edits, flags, current,
    seenIndices: [...seenIndices],
    sessionRound, ts: Date.now()
  }));
}

function clearDraft() { localStorage.removeItem(DRAFT_KEY); }

function restoreDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.picked?.length) return false;
    if (!d.picked.every(p => p.i >= 0 && p.i < snippets.length)) return false;
    picked       = d.picked;
    edits        = d.edits;
    flags        = d.flags;
    current      = d.current || 0;
    seenIndices  = new Set(d.seenIndices || []);
    sessionRound = d.sessionRound || 0;
    draftRestored = true;
    return true;
  } catch(e) { return false; }
}

// ── Pick batch ─────────────────────────────────────────────────
function pickBatch(all, avoid) {
  sessionRound++;
  const seed    = parseInt(todayStr().replace(/-/g,''), 10) + sessionRound * 999983;
  const rand    = mulberry32(seed);
  const retired = new Set(progress.retired || []);

  const pool = all
    .map((text, i) => ({ i, text, passes: progress[String(i)] || 0 }))
    .filter(s => !avoid.has(s.i) && !retired.has(s.i));
  if (!pool.length) return [];

  const shuffle = arr => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  };

  const byPasses = {};
  pool.forEach(s => { (byPasses[s.passes] = byPasses[s.passes] || []).push(s); });
  const tiers = Object.keys(byPasses).map(Number).sort((a, b) => a - b);

  const chosen = [];
  for (const t of tiers) {
    if (chosen.length >= N) break;
    const tier = byPasses[t];
    shuffle(tier);
    chosen.push(...tier.slice(0, N - chosen.length));
  }

  return chosen.sort((a, b) => a.i - b.i).map(({ i, text }) => ({ i, text }));
}

// ── Helpers ────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0, 10); }

function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function fromB64(b64) {
  return new TextDecoder().decode(
    Uint8Array.from(atob(b64.replace(/\n/g, '')), c => c.charCodeAt(0))
  );
}

function wc(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function getPAT() { return localStorage.getItem('gh_pat') || ''; }
function setPAT(p) { localStorage.setItem('gh_pat', p.trim()); }

// ── GitHub API ─────────────────────────────────────────────────
async function fetchFile(path) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const r = await fetch(url, { headers: { Authorization: `token ${getPAT()}` } });
  if (r.status === 404) return { text: null, sha: null };
  if (!r.ok) throw new Error(`Could not fetch ${path}: ${r.status}`);
  const d = await r.json();
  return { text: fromB64(d.content), sha: d.sha };
}

async function putFile(path, content, sha, message) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const body = { message, content: toB64(content), branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `token ${getPAT()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error((await r.json()).message || `Failed to write ${path}`);
  return (await r.json()).content.sha;
}

async function loadProgress() {
  const { text, sha } = await fetchFile('progress.json');
  progressSha = sha;
  try { progress = text ? JSON.parse(text) : {}; } catch(e) { progress = {}; }
}

// Load your accumulated edits so a snippet re-opens where you left it, not the original.
async function loadManuscriptEdited() {
  msEdits = {};
  try {
    const { text } = await fetchFile('manuscript-edited.md');
    if (!text) return;
    parseSnippets(text).forEach((t, i) => {
      if (i < snippets.length && t !== snippets[i]) msEdits[i] = t;
    });
  } catch(e) { /* first run / offline — fall back to originals */ }
}

// The text to start editing from: your latest edit if you've touched it, else the original.
function startText(i) { return (i in msEdits) ? msEdits[i] : snippets[i]; }

async function fetchInbox() {
  const r = await fetch(
    `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/inbox.md?t=${Date.now()}`
  );
  if (!r.ok) throw new Error('Could not load inbox.md');
  return r.text();
}

function parseSnippets(text) {
  return text.split('\n---\n').map(s => s.trim()).filter(s => s && !s.startsWith('#'));
}

// ── Commit ─────────────────────────────────────────────────────
async function commitAll(upTo) {
  const date  = todayStr();
  const batch = picked.slice(0, upTo);
  const bEdits = edits.slice(0, upTo);
  const bFlags = flags.slice(0, upTo);

  let { text: msText, sha: msSha } = await fetchFile('manuscript-edited.md');
  let ms = msText ? parseSnippets(msText) : snippets.slice();
  batch.forEach((p, i) => {
    if (!bFlags[i] && p.i < ms.length) ms[p.i] = bEdits[i];
  });
  const msOut = '# Parliament of the Snake — Edited Manuscript\n\n---\n\n' +
    ms.join('\n\n---\n\n') + '\n\n---\n';
  await putFile('manuscript-edited.md', msOut, msSha, `Edit — ${date}`);

  // Only append to rebuild.md the snippets not already on the list.
  const flaggedNew = batch.filter((p, i) => bFlags[i] && !flagSet.has(p.i));
  if (flaggedNew.length) {
    let { text: rbText, sha: rbSha } = await fetchFile('rebuild.md');
    const base = rbText || '# Rebuild List\n\nPassages flagged for structural work.\n';
    const additions = '\n---\n\n' + flaggedNew.map(p =>
      `**Snippet ${p.i + 1}**\n\n${p.text}`
    ).join('\n\n---\n\n');
    await putFile('rebuild.md', base + additions, rbSha, `Flag for rebuild — ${date}`);
  }

  batch.forEach(p => {
    const k = String(p.i);
    progress[k] = (progress[k] || 0) + 1;
  });
  batch.forEach((p, i) => { if (bFlags[i]) flagSet.add(p.i); });
  progress.flagged = [...flagSet];
  progressSha = await putFile('progress.json', JSON.stringify(progress, null, 2), progressSha, `Progress — ${date}`);

  // Keep in-memory edits current so re-opening a snippet this session shows the latest.
  batch.forEach((p, i) => {
    if (bFlags[i]) return;
    if (bEdits[i] !== snippets[p.i]) msEdits[p.i] = bEdits[i]; else delete msEdits[p.i];
  });

  clearDraft();
  draftRestored = false;
  localStorage.setItem('pots_lastCommit', new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
  return {
    edited:  batch.filter((p, i) => !bFlags[i] && bEdits[i] !== p.text).length,
    flagged: flaggedNew.length
  };
}

// ── Retire ─────────────────────────────────────────────────────
async function doRetire(snippetIndex) {
  const btn = document.getElementById('retire-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Retiring…'; }

  try {
    if (!Array.isArray(progress.retired)) progress.retired = [];
    if (!progress.retired.includes(snippetIndex)) progress.retired.push(snippetIndex);
    progressSha = await putFile(
      'progress.json',
      JSON.stringify(progress, null, 2),
      progressSha,
      `Retire snippet ${snippetIndex + 1}`
    );

    const batchIdx = picked.findIndex(p => p.i === snippetIndex);
    if (batchIdx > -1) {
      picked.splice(batchIdx, 1);
      edits.splice(batchIdx, 1);
      flags.splice(batchIdx, 1);
      current = Math.min(current, Math.max(0, picked.length - 1));
    }

    if (!picked.length) {
      clearDraft();
      render(`
        <div class="center">
          <h2 style="color:var(--accent)">Retired.</h2>
          <p>Snippet removed from rotation.</p>
          <div style="display:flex;gap:1rem;justify-content:center;margin-top:2rem">
            <button onclick="keepGoing()">Keep going →</button>
            <button style="color:var(--muted)" onclick="render('')">Done for now</button>
          </div>
        </div>`);
      return;
    }
    saveDraft();
    showSnippet();
  } catch(e) {
    if (Array.isArray(progress.retired)) {
      const idx = progress.retired.indexOf(snippetIndex);
      if (idx > -1) progress.retired.splice(idx, 1);
    }
    if (btn) { btn.disabled = false; btn.textContent = '✓ Done'; }
    alert('Retire failed: ' + e.message);
  }
}

// ── Stats ──────────────────────────────────────────────────────
function showStats() {
  const retired     = new Set(progress.retired || []);
  const total       = snippets.length;
  const retiredCount = retired.size;
  const active      = total - retiredCount;

  const passCounts = {};
  let touched = 0;
  for (let i = 0; i < total; i++) {
    if (retired.has(i)) continue;
    const p = progress[String(i)] || 0;
    passCounts[p] = (passCounts[p] || 0) + 1;
    if (p > 0) touched++;
  }

  const pct    = active > 0 ? Math.round(touched / active * 100) : 0;
  const filled = Math.round(pct / 5);
  const bar    = '█'.repeat(filled) + '░'.repeat(20 - filled);

  const maxPass = Math.max(0, ...Object.keys(passCounts).map(Number));
  const distRows = [];
  for (let p = 0; p <= maxPass; p++) {
    const count = passCounts[p] || 0;
    if (!count) continue;
    const label = p === 0 ? 'Never seen' : p === 1 ? '1 pass' : `${p} passes`;
    distRows.push(`
      <div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--muted)">${label}</span>
        <span style="color:var(--accent)">${count}</span>
      </div>`);
  }
  if (retiredCount) {
    distRows.push(`
      <div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--muted)">Retired (done forever)</span>
        <span style="color:var(--muted)">${retiredCount}</span>
      </div>`);
  }

  render(`
    <div style="max-width:420px;margin:3rem auto">
      <div class="project">Parliament of the Snake</div>
      <div style="font-size:1.3rem;color:var(--accent);font-style:italic;margin:0.3rem 0 2rem">Progress</div>
      <div style="font-family:monospace;font-size:0.82rem;color:var(--accent);letter-spacing:-0.03em;margin-bottom:0.5rem">${bar}</div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:2rem">
        ${touched} of ${active} passages touched · ${pct}%
      </div>
      <div style="font-size:0.88rem">${distRows.join('')}</div>
      <button onclick="${picked.length ? 'showSnippet()' : 'keepGoing()'}" style="margin-top:2.5rem">
        ${picked.length ? '← Back to editing' : 'Start editing →'}
      </button>
    </div>`);
}

// ── Capture ────────────────────────────────────────────────────
function showCapture() {
  render(`
    <div style="max-width:520px;margin:3rem auto">
      <div class="project">Parliament of the Snake</div>
      <div style="font-size:1.3rem;color:var(--accent);font-style:italic;margin:0.3rem 0 1.5rem">Add to inbox</div>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem">
        Type or paste a passage — it'll be appended to inbox.md and start appearing in sessions.
      </p>
      <textarea class="capture-ta" id="capture-area" placeholder="Type or paste your passage here…"></textarea>
      <div id="capture-err" class="err" style="font-size:0.85rem;margin-bottom:0.8rem;min-height:1.2em"></div>
      <div style="display:flex;gap:0.8rem">
        <button id="capture-submit" class="primary" onclick="doCapture()">Add to inbox</button>
        <button onclick="${picked.length ? 'showSnippet()' : ''}">Cancel</button>
      </div>
    </div>`);
  document.getElementById('capture-area').focus();
}

async function doCapture() {
  const text = document.getElementById('capture-area').value.trim();
  if (!text) return;
  const btn = document.getElementById('capture-submit');
  btn.disabled = true; btn.textContent = 'Adding…';
  try {
    const { text: inboxText, sha: inboxSha } = await fetchFile('inbox.md');
    if (!inboxSha) throw new Error('Could not read inbox.md');
    const newInbox = inboxText.trimEnd() + '\n---\n' + text + '\n';
    await putFile('inbox.md', newInbox, inboxSha, `Add snippet — ${todayStr()}`);
    snippets.push(text);
    render(`
      <div class="center">
        <h2 style="color:var(--accent)">Added.</h2>
        <p>Snippet #${snippets.length} added to inbox.</p>
        <button onclick="${picked.length ? 'showSnippet()' : 'keepGoing()'}" style="margin-top:1.5rem">
          ${picked.length ? '← Back to editing' : 'Start editing →'}
        </button>
      </div>`);
  } catch(e) {
    const err = document.getElementById('capture-err');
    if (err) err.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Add to inbox';
  }
}

// ── Find (jump to a snippet by number, or search text) ─────────
function showFind() {
  saveEdit();
  render(`
    <div style="max-width:560px;margin:2.5rem auto">
      <div class="project">Parliament of the Snake</div>
      <div style="font-size:1.3rem;color:var(--accent);font-style:italic;margin:0.3rem 0 1.2rem">Find a passage</div>
      <input id="find-input" inputmode="search" autocomplete="off"
        placeholder="Snippet number (1–${snippets.length}) or search text…"
        style="width:100%;padding:0.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:Georgia,serif;font-size:1rem;outline:none;margin-bottom:0.5rem">
      <div style="text-align:right;margin-bottom:1rem">
        <button onclick="${picked.length ? 'showSnippet()' : 'keepGoing()'}">${picked.length ? 'Back to editing' : 'Close'}</button>
      </div>
      <div id="find-results" style="font-size:0.9rem"></div>
    </div>`);
  const inp = document.getElementById('find-input');
  inp.addEventListener('input', runFind);
  inp.focus();
}

function findRow(i, preview) {
  const marks = ((i in msEdits) ? '<span style="color:var(--accent)"> ✎ edited</span>' : '') +
                (flagSet.has(i) ? '<span style="color:var(--flag)"> 🚩 rebuild</span>' : '') +
                ((progress.retired || []).includes(i) ? '<span style="color:var(--muted)"> ✓ done</span>' : '');
  return `<div onclick="loadSpecific(${i})" style="padding:0.7rem 0.2rem;border-bottom:1px solid var(--border);cursor:pointer">
    <span style="color:var(--accent)">Snippet ${i + 1}</span>${marks}
    <div style="color:#888;font-size:0.85rem;margin-top:0.25rem">${esc(preview)}</div>
  </div>`;
}

function runFind(e) {
  const q = e.target.value.trim();
  const box = document.getElementById('find-results');
  if (!q) { box.innerHTML = ''; return; }

  const rows = [];
  if (/^\d+$/.test(q)) {
    const n = parseInt(q, 10);
    if (n >= 1 && n <= snippets.length) {
      const i = n - 1;
      rows.push(findRow(i, snippets[i].slice(0, 140)));
    }
  }
  const needle = q.toLowerCase();
  let hits = 0;
  for (let i = 0; i < snippets.length && hits < 40; i++) {
    if (/^\d+$/.test(q) && i === parseInt(q, 10) - 1) continue;
    const idx = snippets[i].toLowerCase().indexOf(needle);
    if (idx === -1) continue;
    const start = Math.max(0, idx - 30);
    rows.push(findRow(i, (start ? '…' : '') + snippets[i].slice(start, idx + 110)));
    hits++;
  }
  box.innerHTML = rows.length ? rows.join('') :
    `<div style="color:var(--muted);padding:1rem 0">No matches.</div>`;
}

// ── Render ─────────────────────────────────────────────────────
const app = document.getElementById('app');
function render(html) { app.innerHTML = html; }

function saveEdit() {
  const a = document.getElementById('edit-area');
  if (a) edits[current] = a.value;
}

function toggleFlag(i) {
  saveEdit();
  flags[i] = !flags[i];
  saveDraft();
  showSnippet();
}

function showWcDelta() {
  const el = document.getElementById('wc-delta');
  if (!el || !picked[current]) return;
  const delta = wc(edits[current]) - wc(picked[current].text);
  if (delta === 0) { el.textContent = ''; return; }
  el.textContent = (delta > 0 ? '+' : '') + delta + ' words';
  el.style.color  = delta < 0 ? '#6a9a6a' : '#c8885e';
}

function showSnippet() {
  const p         = picked[current];
  const isLast    = current === picked.length - 1;
  const isFlagged = flags[current];
  const passes    = progress[String(p.i)] || 0;

  const dots = picked.map((_, i) => {
    const cls = flags[i] ? 'flagged' : i < current ? 'done' : i === current ? 'current' : '';
    return `<div class="dot ${cls}" onclick="goTo(${i})"></div>`;
  }).join('');

  const editArea = isFlagged
    ? `<div class="flagged-msg">Flagged for structural rebuild — won't be edited here.</div>`
    : `<textarea id="edit-area">${esc(edits[current])}</textarea>
       <div class="wc-delta" id="wc-delta"></div>`;

  render(`
    <header>
      <div class="project">Parliament of the Snake</div>
      <div class="session-date">${fmtDate(todayStr())}</div>
    </header>
    ${draftRestored ? `<div style="font-size:0.75rem;color:#c8885e;margin-bottom:1.5rem;padding:0.5rem 0.8rem;border:1px solid #c8885e33;border-radius:4px">● Unsaved draft — these edits haven't been committed to GitHub yet</div>` : ''}

    <div class="progress">${dots}</div>

    <div class="label">Raw — ${current + 1} of ${picked.length}${passes > 0 ? `<span class="pass-badge">pass ${passes + 1}</span>` : ''}</div>
    <div class="raw ${isFlagged ? 'is-flagged' : ''}">${esc(p.text)}</div>

    <div class="label">${isFlagged ? 'Flagged' : ((p.i in msEdits) ? 'Your edit &middot; <span style="color:var(--accent)">continued</span>' : 'Your edit')}</div>
    ${editArea}

    <div class="nav">
      <button onclick="goTo(${current - 1})" ${current === 0 ? 'disabled' : ''}>← Back</button>
      <button class="flag-btn ${isFlagged ? 'active' : ''}" onclick="toggleFlag(${current})">
        ${isFlagged ? '🚩 Flagged' : '🚩 Flag'}
      </button>
      <button class="retire-btn" id="retire-btn" onclick="doRetire(${p.i})">✓ Done</button>
      <div class="spacer"></div>
      <button onclick="doCommit()">Commit ↗</button>
      ${!isLast ? `<button class="primary" onclick="goTo(${current + 1})">Next →</button>` : ''}
    </div>`);

  if (!isFlagged) {
    const ta = document.getElementById('edit-area');
    ta.addEventListener('input', e => {
      edits[current] = e.target.value;
      saveDraft();
      showWcDelta();
    });
    showWcDelta();
  }
}

function goTo(i) {
  saveEdit();
  current = Math.max(0, Math.min(picked.length - 1, i));
  saveDraft();
  showSnippet();
  window.scrollTo(0, 0);
}

function loadBatch() {
  picked = pickBatch(snippets, seenIndices);
  if (!picked.length) {
    render(`<div class="center"><h2 style="color:var(--accent)">All done.</h2><p>You've been through everything.</p></div>`);
    return false;
  }
  picked.forEach(p => seenIndices.add(p.i));
  edits   = picked.map(p => startText(p.i));
  flags   = picked.map(p => flagSet.has(p.i));
  current = 0;
  return true;
}

// Open one specific snippet (from the Find screen) as a single-item batch.
function loadSpecific(i) {
  saveEdit();
  picked  = [{ i, text: snippets[i] }];
  edits   = [startText(i)];
  flags   = [flagSet.has(i)];
  current = 0;
  seenIndices.add(i);
  draftRestored = false;
  saveDraft();
  showSnippet();
  window.scrollTo(0, 0);
}

async function doCommit() {
  saveEdit();
  render('<div class="center"><h2 style="color:var(--muted);font-size:1rem">Saving…</h2></div>');
  try {
    const { edited, flagged } = await commitAll(current + 1);
    const retiredCount = (progress.retired || []).length;
    const remaining    = snippets.length - seenIndices.size - retiredCount;
    render(`
      <div class="center">
        <h2 style="color:var(--accent)">Saved.</h2>
        <p>${edited} edit${edited !== 1 ? 's' : ''} committed to GitHub</p>
        ${flagged ? `<p>${flagged} flagged → rebuild.md</p>` : ''}
        <p style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">${new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})} · ${remaining} passages still unseen</p>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:2rem">
          <button onclick="keepGoing()">Keep going →</button>
          <button style="color:var(--muted)">Happy</button>
        </div>
      </div>`);
  } catch (e) {
    const isAuth = /401|credential|token/i.test(e.message);
    render(`
      <div class="center">
        <h2 class="err">Save failed</h2>
        <p>${esc(e.message)}</p>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem">
          <button onclick="doCommit()">Try again</button>
          ${isAuth ? `<button onclick="showSetup('Token rejected')">Update token</button>` : ''}
        </div>
      </div>`);
  }
}

function keepGoing() {
  if (loadBatch()) showSnippet();
}

// ── Setup ──────────────────────────────────────────────────────
function showSetup(err) {
  render(`
    <div class="setup">
      <h2>One-time setup</h2>
      <p>
        Needs a GitHub <strong>classic</strong> token with <strong>repo</strong> scope.<br><br>
        GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate.
      </p>
      <input type="password" id="pat" placeholder="ghp_…" value="${esc(getPAT())}">
      ${err ? `<p class="err" style="margin-bottom:1rem">${esc(err)}</p>` : ''}
      <button class="primary" onclick="savePAT()">Save &amp; start</button>
    </div>`);
  document.getElementById('pat').focus();
}

function savePAT() {
  const v = document.getElementById('pat').value.trim();
  if (!v) return;
  setPAT(v);
  init();
}

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  if (!getPAT()) { showSetup(); return; }
  render('<div class="center"><h2 style="color:var(--muted);font-size:1rem">Loading…</h2></div>');
  try {
    const [raw] = await Promise.all([fetchInbox(), loadProgress()]);
    snippets = parseSnippets(raw);
    if (!snippets.length) throw new Error('inbox.md is empty');
    await loadManuscriptEdited();
    flagSet = new Set(progress.flagged || []);
    if (restoreDraft()) {
      showSnippet();
    } else {
      seenIndices  = new Set();
      sessionRound = 0;
      if (loadBatch()) showSnippet();
    }
  } catch (e) {
    render(`
      <div class="center">
        <h2 class="err">Couldn't load</h2>
        <p>${esc(e.message)}</p>
        <button onclick="init()" style="margin-top:1.5rem">Retry</button>
      </div>`);
  }
}

init();
</script>
</body>
</html>
