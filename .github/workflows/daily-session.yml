name: Daily Editing Session

on:
  schedule:
    # 9am UTC — adjust to your timezone: https://crontab.guru
    - cron: "0 9 * * *"
  workflow_dispatch: # lets you trigger it manually from GitHub

jobs:
  create-session:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check for existing issue today
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          EXISTING=$(gh issue list --label "daily-edit" --state open --search "Daily Edit $TODAY" --json number --jq '.[0].number // ""')
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Generate body and create issue
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=${{ steps.check.outputs.today }}
          gh label create "daily-edit" --color "0075ca" --description "Daily editing session" 2>/dev/null || true
          python3 generate_issue_body.py > /tmp/issue_body.md
          gh issue create \
            --title "Daily Edit $TODAY" \
            --label "daily-edit" \
            --body-file /tmp/issue_body.md

      - name: Already exists
        if: steps.check.outputs.existing != ''
        run: echo "Issue already exists for today (#${{ steps.check.outputs.existing }}). Skipping."
